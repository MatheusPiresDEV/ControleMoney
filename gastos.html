<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gastos Mensais - Controle Financeiro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Controle Financeiro Pessoal</h1>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Início</a></li>
                <li><a href="salario.html">Salário e Receitas</a></li>
                <li><a href="gastos.html">Gastos Mensais</a></li>
                <li><a href="resumo.html">Resumo Financeiro</a></li>
                <li><a href="investimentos.html">Investimentos</a></li>
                <li><a href="projecoes.html">Projeções</a></li>
                <li><a href="metas.html">Metas</a></li>
                <li><a href="cartao.html">Cartão de Crédito</a></li>
                <li><a href="historico.html">Histórico</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="gastos">
            <h2>Gastos Mensais</h2>
            <form id="gastosForm">
                <label for="dataGasto">Data:</label>
                <input type="date" id="dataGasto" required>
                <label for="categoriaGasto">Categoria:</label>
                <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                    <select id="categoriaGasto" required>
                        <option value="">Selecione uma categoria</option>
                        <option value="Alimentação">Alimentação</option>
                        <option value="Mercado">Mercado (Vale)</option>
                        <option value="Transporte">Transporte</option>
                        <option value="Lazer">Lazer</option>
                        <option value="Saúde">Saúde</option>
                        <option value="Outro">Outro</option>
                    </select>
                    <button type="button" onclick="adicionarCategoria()" class="btn">+ Nova Categoria</button>
                </div>
                <label for="descricaoGasto">Descrição:</label>
                <input type="text" id="descricaoGasto" required>
                <label for="valorGasto">Valor:</label>
                <input type="number" id="valorGasto" step="0.01" required>
                <label for="formaPagamento">Forma de Pagamento:</label>
                <select id="formaPagamento" required>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Pix">Pix</option>
                </select>
                <button type="submit" class="btn">Adicionar Gasto</button>
            </form>
            <div id="filtrosGastos">
                <label for="filtroCategoria">Filtrar por Categoria:</label>
                <select id="filtroCategoria">
                    <option value="">Todas</option>
                    <option value="Alimentação">Alimentação</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Lazer">Lazer</option>
                    <option value="Saúde">Saúde</option>
                    <option value="Outros">Outros</option>
                </select>
                <label for="filtroPagamento">Filtrar por Forma de Pagamento:</label>
                <select id="filtroPagamento">
                    <option value="">Todas</option>
                    <option value="Dinheiro">Dinheiro</option>
                    <option value="Cartão">Cartão</option>
                    <option value="Pix">Pix</option>
                </select>
            </div>
            <table id="tabelaGastos">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Categoria</th>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Forma de Pagamento</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="totalGastos"></div>
            <canvas id="graficoPizza" width="400" height="400"></canvas>
            <canvas id="graficoBarras" width="400" height="200"></canvas>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
