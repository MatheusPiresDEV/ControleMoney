<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metas - Controle Financeiro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Controle Financeiro Pessoal</h1>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Início</a></li>
                <li><a href="salario.html">Salário e Receitas</a></li>
                <li><a href="gastos.html">Gastos Mensais</a></li>
                <li><a href="resumo.html">Resumo Financeiro</a></li>
                <li><a href="investimentos.html">Investimentos</a></li>
                <li><a href="projecoes.html">Projeções</a></li>
                <li><a href="metas.html">Metas</a></li>
                <li><a href="cartao.html">Cartão de Crédito</a></li>
                <li><a href="historico.html">Histórico</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="metas">
            <h2>Metas</h2>
            <form id="metaForm">
                <label for="nomeMeta">Meta:</label>
                <input type="text" id="nomeMeta" required>
                <label for="valorAlvo">Valor Alvo:</label>
                <input type="number" id="valorAlvo" step="0.01" required>
                <label for="prazoMeta">Prazo (meses):</label>
                <input type="number" id="prazoMeta" required>
                <button type="submit" class="btn">Adicionar Meta</button>
            </form>
            <table id="tabelaMetas">
                <thead>
                    <tr>
                        <th>Meta</th>
                        <th>Valor Alvo</th>
                        <th>Prazo (meses)</th>
                        <th>Valor Mensal Necessário</th>
                        <th>Meses para Atingir</th>
                        <th>Situação</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <canvas id="graficoMetas" width="400" height="300"></canvas>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
