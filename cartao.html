<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartão de Crédito - Controle Financeiro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Controle Financeiro Pessoal</h1>
        <button class="menu-toggle" onclick="toggleMenu()">☰</button>
        <nav>
            <ul id="nav-menu">
                <li><a href="index.html">Início</a></li>
                <li><a href="salario.html">Salário e Receitas</a></li>
                <li><a href="gastos.html">Gastos Mensais</a></li>
                <li><a href="resumo.html">Resumo Financeiro</a></li>
                <li><a href="investimentos.html">Investimentos</a></li>
                <li><a href="projecoes.html">Projeções</a></li>
                <li><a href="metas.html">Metas</a></li>
                <li><a href="cartao.html">Cartão de Crédito</a></li>
                <li><a href="historico.html">Histórico</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="cartao">
            <h2>Cartão de Crédito</h2>
            <form id="cartaoForm">
                <label for="dataCompra">Data:</label>
                <input type="date" id="dataCompra" required>
                <label for="categoriaCompra">Categoria:</label>
                <select id="categoriaCompra" required>
                    <option value="Alimentação">Alimentação</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Lazer">Lazer</option>
                    <option value="Saúde">Saúde</option>
                    <option value="Outros">Outros</option>
                </select>
                <label for="descricaoCompra">Descrição:</label>
                <input type="text" id="descricaoCompra" required>
                <label for="valorCompra">Valor:</label>
                <input type="number" id="valorCompra" step="0.01" required>
                <label for="cartaoUtilizado">Cartão:</label>
                <input type="text" id="cartaoUtilizado" required>
                <label for="parcela">Parcela:</label>
                <input type="number" id="parcela" required>
                <button type="submit" class="btn">Adicionar Compra</button>
            </form>
            <table id="tabelaCartao">
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Categoria</th>
                        <th>Descrição</th>
                        <th>Valor</th>
                        <th>Cartão</th>
                        <th>Parcela</th>
                        <th>Valor Parcela</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div id="limitesCartao"></div>
            <canvas id="graficoCartao" width="400" height="200"></canvas>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
